<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HyperMenu - Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-900 flex items-center justify-center min-h-screen">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md">
        <h1 class="text-2xl font-bold text-center mb-6">Welcome to HyperMenu</h1>
        
        <div class="space-y-3">
            <button class="w-full flex items-center justify-center gap-3 border border-slate-300 p-2 rounded-lg hover:bg-slate-50 transition">
                <img src="https://www.google.com/favicon.ico" class="w-5"> Continue with Gmail
            </button>
            <button class="w-full flex items-center justify-center gap-3 bg-blue-600 text-white p-2 rounded-lg hover:bg-blue-700 transition">
                <img src="https://www.microsoft.com/favicon.ico" class="w-5"> Continue with Hotmail
            </button>
        </div>

        <div class="relative my-6">
            <div class="absolute inset-0 flex items-center"><span class="w-full border-t"></span></div>
            <div class="relative flex justify-center text-xs uppercase"><span class="bg-white px-2 text-slate-500">Or email</span></div>
        </div>

        <form action="dashboard.html" class="space-y-4">
            <input type="email" placeholder="Email" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <input type="password" placeholder="Password" class="w-full p-2 border border-slate-300 rounded-lg focus:ring-2 focus:ring-blue-500 outline-none">
            <button type="submit" class="w-full bg-slate-900 text-white p-3 rounded-lg font-bold hover:bg-black transition">Sign In</button>
        </form>
    </div>
</body>
</html>
